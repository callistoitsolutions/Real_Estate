<title>Flats & Houses for Rent in Nagpur — PropCRM</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">
<style>
:root{--pr:#f97316;--pr2:#ea580c;--sec:#0f172a;--muted:#64748b;--border:#e2e8f0;--bg:#f8fafc;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:#1e293b;}
.nav{background:#fff;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:500;box-shadow:0 1px 8px rgba(0,0,0,.06);}
.nav-inner{max-width:1300px;margin:0 auto;padding:0 20px;display:flex;align-items:center;gap:16px;height:60px;}
.logo{font-weight:900;font-size:1.2rem;color:var(--sec);text-decoration:none;}
.logo span{color:var(--pr);}
.nav-links{display:flex;gap:2px;margin-left:16px;}
.nl{padding:6px 12px;border-radius:7px;font-size:.82rem;font-weight:600;color:var(--muted);text-decoration:none;transition:.2s;}
.nl:hover{background:#f1f5f9;color:var(--sec);}.nl.active{color:var(--pr);}
.nav-right{margin-left:auto;display:flex;gap:8px;align-items:center;}
.btn{padding:7px 16px;border-radius:8px;font-weight:700;font-size:.81rem;cursor:pointer;border:none;transition:.2s;text-decoration:none;display:inline-flex;align-items:center;gap:5px;}
.btn-pr{background:var(--pr);color:white;}.btn-pr:hover{background:var(--pr2);}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--sec);}
.btn-outline:hover{border-color:var(--pr);color:var(--pr);}

/* SEARCH BAR */
.search-bar{background:white;border-bottom:1px solid var(--border);padding:14px 20px;}
.sb-inner{max-width:1300px;margin:0 auto;display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.sb-field{display:flex;flex-direction:column;gap:2px;}
.sb-label{font-size:.6rem;font-weight:700;color:var(--muted);text-transform:uppercase;}
.sb-sel{background:white;border:1.5px solid var(--border);border-radius:8px;padding:7px 12px;font-size:.82rem;font-weight:600;color:var(--sec);cursor:pointer;min-width:130px;}
.sb-sel:focus{outline:none;border-color:var(--pr);}
.sb-inp{background:white;border:1.5px solid var(--border);border-radius:8px;padding:7px 12px;font-size:.82rem;color:var(--sec);min-width:200px;}
.sb-inp:focus{outline:none;border-color:var(--pr);}
.sb-search-btn{background:var(--pr);color:white;border:none;border-radius:8px;padding:9px 20px;font-weight:700;font-size:.83rem;cursor:pointer;white-space:nowrap;}

/* LAYOUT */
.page-layout{max-width:1300px;margin:0 auto;padding:20px;display:grid;grid-template-columns:280px 1fr;gap:20px;}

/* FILTER SIDEBAR */
.filter-sidebar{background:white;border-radius:14px;border:1px solid var(--border);padding:20px;height:fit-content;position:sticky;top:80px;}
.fs-title{font-size:.86rem;font-weight:800;color:var(--sec);margin-bottom:16px;display:flex;justify-content:space-between;}
.fs-clear{font-size:.74rem;font-weight:600;color:var(--pr);cursor:pointer;}
.filter-group{margin-bottom:20px;padding-bottom:20px;border-bottom:1px solid var(--border);}
.filter-group:last-child{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.fg-title{font-size:.76rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:10px;}
.filter-btn{padding:7px 13px;border-radius:8px;font-size:.78rem;font-weight:600;cursor:pointer;
  border:1.5px solid var(--border);background:white;color:var(--muted);transition:.2s;margin:3px;}
.filter-btn:hover,.filter-btn.active{background:var(--pr);color:white;border-color:var(--pr);}
.range-input{width:100%;accent-color:var(--pr);cursor:pointer;}
.range-labels{display:flex;justify-content:space-between;font-size:.72rem;color:var(--muted);margin-top:4px;}
.checkbox-item{display:flex;align-items:center;gap:8px;padding:5px 0;cursor:pointer;font-size:.81rem;}
.checkbox-item input{accent-color:var(--pr);width:15px;height:15px;}

/* RESULTS AREA */
.results-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;flex-wrap:wrap;gap:8px;}
.rh-count{font-size:.88rem;font-weight:700;color:var(--sec);}
.rh-count span{color:var(--pr);}
.rh-sort{display:flex;align-items:center;gap:8px;}
.sort-select{background:white;border:1.5px solid var(--border);border-radius:8px;padding:6px 12px;font-size:.8rem;font-weight:600;color:var(--sec);cursor:pointer;}
.view-toggle{display:flex;gap:4px;}
.vt-btn{width:32px;height:32px;border-radius:7px;border:1.5px solid var(--border);background:white;color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.8rem;transition:.2s;}
.vt-btn.active{background:var(--pr);color:white;border-color:var(--pr);}

/* PROP CARDS GRID */
.listings-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.listings-grid.list-view{grid-template-columns:1fr;}

/* PROPERTY CARD */
.pcard{background:white;border-radius:14px;border:1px solid var(--border);overflow:hidden;transition:.3s;cursor:pointer;text-decoration:none;color:inherit;display:block;}
.pcard:hover{transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,.09);color:inherit;}
.pc-img{height:180px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;}
.pc-img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:3.5rem;}
.pc-badges{position:absolute;top:10px;left:10px;display:flex;gap:4px;flex-wrap:wrap;}
.badge{font-size:.62rem;font-weight:800;padding:3px 8px;border-radius:6px;}
.b-feat{background:#f59e0b;color:white;}.b-verif{background:#10b981;color:white;}
.b-excl{background:#7c3aed;color:white;}.b-new{background:#3b82f6;color:white;}
.b-rent{background:rgba(255,255,255,.9);color:#0f172a;}.b-sale{background:var(--pr);color:white;}
.pc-save{position:absolute;top:10px;right:10px;width:32px;height:32px;
  background:rgba(255,255,255,.9);border-radius:50%;display:flex;align-items:center;
  justify-content:center;cursor:pointer;transition:.2s;font-size:.85rem;border:none;}
.pc-price-tag{position:absolute;bottom:10px;left:10px;
  background:rgba(15,23,42,.85);backdrop-filter:blur(8px);
  color:white;padding:4px 10px;border-radius:7px;font-size:.88rem;font-weight:900;}
.pc-body{padding:14px;}
.pc-title{font-size:.9rem;font-weight:800;color:var(--sec);margin-bottom:3px;}
.pc-addr{font-size:.74rem;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:4px;}
.pc-specs{display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap;}
.spec{font-size:.74rem;color:#475569;display:flex;align-items:center;gap:4px;font-weight:600;}
.spec i{color:var(--muted);font-size:.7rem;}
.pc-tags{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap;}
.pt{font-size:.66rem;font-weight:600;padding:2px 8px;border-radius:5px;background:#f1f5f9;color:#475569;}
.pc-footer{display:flex;justify-content:space-between;align-items:center;padding-top:10px;border-top:1px solid var(--border);}
.pc-agent{display:flex;align-items:center;gap:7px;}
.pa-av{width:26px;height:26px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:.64rem;font-weight:800;color:white;}
.pa-name{font-size:.7rem;font-weight:700;color:var(--sec);}
.pa-role{font-size:.6rem;color:var(--muted);}
.pc-contact-btns{display:flex;gap:5px;}
.cb{padding:5px 10px;border-radius:7px;font-size:.72rem;font-weight:700;cursor:pointer;border:1.5px solid var(--border);background:white;transition:.2s;display:flex;align-items:center;gap:4px;}
.cb:hover{border-color:var(--pr);color:var(--pr);}
.cb.wa:hover{border-color:#25d366;color:#25d366;}

/* PAGINATION */
.pagination{display:flex;justify-content:center;gap:6px;margin-top:28px;flex-wrap:wrap;}
.pg-btn{width:36px;height:36px;border-radius:8px;border:1.5px solid var(--border);background:white;color:var(--muted);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.82rem;font-weight:700;transition:.2s;}
.pg-btn:hover{border-color:var(--pr);color:var(--pr);}
.pg-btn.active{background:var(--pr);color:white;border-color:var(--pr);}

/* LIST VIEW CARD */
.listings-grid.list-view .pcard{display:grid;grid-template-columns:260px 1fr;}
.listings-grid.list-view .pc-img{height:100%;min-height:160px;}

/* APPLIED FILTERS */
.applied-filters{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:14px;align-items:center;}
.af-label{font-size:.74rem;color:var(--muted);font-weight:700;}
.af-tag{font-size:.72rem;font-weight:700;padding:4px 10px;border-radius:6px;
  background:#fef3c7;color:#92400e;border:1px solid #fcd34d;display:flex;align-items:center;gap:5px;cursor:pointer;}
.af-tag:hover{background:#fde68a;}

@media(max-width:1024px){.page-layout{grid-template-columns:1fr;}.filter-sidebar{display:none;}}
@media(max-width:768px){.listings-grid{grid-template-columns:1fr;}.listings-grid.list-view{grid-template-columns:1fr;}.listings-grid.list-view .pcard{grid-template-columns:1fr;}}
</style>
</head>

<nav class="nav">

</div>

        <button class="filter-btn" data-filter="furnishing" data-value="Unfurnished">Unfurnished</button>
      </div>
    </div>

    <div class="filter-group">

      <label class="checkbox-item"><input type="checkbox" id="f-owner"> Owner Properties Only</label>

    </div>

    <div class="filter-group">

    </button>
  </div>

  <div>
    <div style="font-size:.76rem;color:var(--muted);margin-bottom:14px;">

        </div>
      </div>
    </div>

    <div class="listings-grid" id="listingsGrid"></div>

    <div class="pagination" id="pagination"></div>
  </div>
</div>

// ══════════════════════════════════════════════════════════════════════════════
// STATE MANAGEMENT
// ══════════════════════════════════════════════════════════════════════════════
let currentFilters = {
  listingType: 'rent',
  bhk: [],
  area: [],
  furnishing: [],
  maxBudget: 100000,
  verified: false,
  featured: false,
  owner: false,
  pet: false,
  amenities: [],
  sort: 'relevant'
};

let currentPage = 1;
const itemsPerPage = 10;

// ══════════════════════════════════════════════════════════════════════════════
// INITIALIZATION
// ══════════════════════════════════════════════════════════════════════════════
document.addEventListener('DOMContentLoaded', () => {
  setupFilterButtons();
  setupCheckboxes();
  applyFilters();
});

function setupFilterButtons() {
  document.querySelectorAll('.filter-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      const filterType = this.getAttribute('data-filter');
      const value = this.getAttribute('data-value');
      
      this.classList.toggle('active');
      
      if (this.classList.contains('active')) {
        if (!currentFilters[filterType].includes(value)) {
          currentFilters[filterType].push(value);
        }
      } else {
        currentFilters[filterType] = currentFilters[filterType].filter(v => v !== value);
      }
    });
  });
}

function setupCheckboxes() {
  document.getElementById('f-verified').addEventListener('change', e => {
    currentFilters.verified = e.target.checked;
  });
  document.getElementById('f-featured').addEventListener('change', e => {
    currentFilters.featured = e.target.checked;
  });
  document.getElementById('f-owner').addEventListener('change', e => {
    currentFilters.owner = e.target.checked;
  });
  document.getElementById('f-pet').addEventListener('change', e => {
    currentFilters.pet = e.target.checked;
  });
  
  ['lift', 'gym', 'pool', 'backup', 'parking'].forEach(amenity => {
    const checkbox = document.getElementById(`amenity-${amenity}`);
    if (checkbox) {
      checkbox.addEventListener('change', e => {
        if (e.target.checked) {
          if (!currentFilters.amenities.includes(amenity)) {
            currentFilters.amenities.push(amenity);
          }
        } else {
          currentFilters.amenities = currentFilters.amenities.filter(a => a !== amenity);
        }
      });
    }
  });
}

// ══════════════════════════════════════════════════════════════════════════════
// FILTERING & SORTING
// ══════════════════════════════════════════════════════════════════════════════
function applyFilters() {
  // Get search bar values
  const searchArea = document.getElementById('loc-inp').value.trim();
  const searchBhk = document.getElementById('type-sel').value;
  const searchBudget = document.getElementById('budget-sel').value;
  const searchFurnishing = document.getElementById('furn-sel').value;
  
  // Update filters from search bar
  if (searchBhk) {
    currentFilters.bhk = [searchBhk];
  }
  if (searchBudget) {
    currentFilters.maxBudget = parseInt(searchBudget);
  }
  if (searchFurnishing) {
    currentFilters.furnishing = [searchFurnishing];
  }
  if (searchArea && searchArea !== 'Nagpur') {
    // Add to area filter if not already there
    const areaMatch = currentFilters.area.find(a => 
      searchArea.toLowerCase().includes(a.toLowerCase())
    );
    if (!areaMatch) {
      currentFilters.area = [searchArea];
    }
  }
  
  // Get sort value
  currentFilters.sort = document.getElementById('sortSelect').value;
  
  // Filter properties
  let filtered = allProperties.filter(prop => {
    // Listing type
    if (prop.listing_type !== currentFilters.listingType) return false;
    
    // BHK
    if (currentFilters.bhk.length > 0 && !currentFilters.bhk.includes(prop.bhk)) return false;
    
    // Area/Location
    if (currentFilters.area.length > 0) {
      const matchesArea = currentFilters.area.some(area => 
        prop.location.toLowerCase().includes(area.toLowerCase())
      );
      if (!matchesArea) return false;
    }
    
    // Furnishing
    if (currentFilters.furnishing.length > 0 && !currentFilters.furnishing.includes(prop.furnished)) {
      return false;
    }
    
    // Budget
    if (prop.price > currentFilters.maxBudget) return false;
    
    // Verified
    if (currentFilters.verified && !prop.badges.includes('verified')) return false;
    
    // Featured
    if (currentFilters.featured && !prop.badges.includes('featured')) return false;
    
    // Owner
    if (currentFilters.owner && prop.owner_role !== 'Owner') return false;
    
    // Amenities
    if (currentFilters.amenities.length > 0) {
      const hasAllAmenities = currentFilters.amenities.every(amenity => 
        prop.amenities.includes(amenity)
      );
      if (!hasAllAmenities) return false;
    }
    
    return true;
  });
  
  // Sort
  filtered = sortProperties(filtered);
  
  // Update UI
  renderProperties(filtered);
  renderAppliedFilters();
  updateResultCount(filtered.length);
}

function sortProperties(properties) {
  const sorted = [...properties];
  
  switch (currentFilters.sort) {
    case 'newest':
      return sorted.sort((a, b) => b.is_new - a.is_new || b.id - a.id);
    case 'price-asc':
      return sorted.sort((a, b) => a.price - b.price);
    case 'price-desc':
      return sorted.sort((a, b) => b.price - a.price);
    default: // relevant
      return sorted.sort((a, b) => {
        const aScore = (a.badges.includes('featured') ? 2 : 0) + (a.is_new ? 1 : 0);
        const bScore = (b.badges.includes('featured') ? 2 : 0) + (b.is_new ? 1 : 0);
        return bScore - aScore;
      });
  }
}

function renderProperties(properties) {
  const grid = document.getElementById('listingsGrid');
  
  if (properties.length === 0) {
    grid.innerHTML = `
      <div style="grid-column:1/-1;text-align:center;padding:60px 20px;color:#64748b;">
        <i class="fas fa-search" style="font-size:2rem;margin-bottom:12px;display:block;"></i>
        <div style="font-size:.92rem;font-weight:700;">No properties found matching your criteria.</div>
        <div style="font-size:.78rem;margin-top:6px;">Try adjusting your filters.</div>
      </div>
    `;
    return;
  }
  
  grid.innerHTML = properties.map(p => {
    const priceDisplay = currentFilters.listingType === 'sale' 
      ? `₹${(p.price / 100000).toFixed(1)}L`
      : `₹${(p.price / 1000).toFixed(1)}K/mo`;
    
    const icon = currentFilters.listingType === 'sale' ? '🏘' : 
                 currentFilters.listingType === 'commercial' ? '🏗' : '🏠';
    
    return `
      <a href="#" class="pcard" onclick="viewProperty(${p.id}); return false;">
        <div class="pc-img">
          <div class="pc-img-placeholder"
               style="background:linear-gradient(135deg,#dbeafe,#bfdbfe);width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:3.5rem;">
            ${icon}
          </div>
          <div class="pc-badges">
            ${p.badges.includes('featured') ? '<span class="badge b-feat">⭐ Featured</span>' : ''}
            ${p.badges.includes('verified') ? '<span class="badge b-verif">✅ Verified</span>' : ''}
            ${currentFilters.listingType === 'sale' ? '<span class="badge b-sale">For Sale</span>' : ''}
            ${currentFilters.listingType === 'commercial' ? '<span class="badge b-excl">🏗 Commercial</span>' : ''}
            ${p.is_new ? '<span class="badge b-new">🆕 New</span>' : ''}
          </div>
          <button class="pc-save" onclick="event.preventDefault();event.stopPropagation();toggleSave(${p.id},this)">
            <i class="far fa-heart" style="color:#ef4444;"></i>
          </button>
          <div class="pc-price-tag">${priceDisplay}</div>
        </div>
        <div class="pc-body">
          <div class="pc-title">${p.title}</div>
          <div class="pc-addr">
            <i class="fas fa-map-marker-alt" style="color:#f97316;font-size:.7rem;"></i>
            ${p.location}
          </div>
          <div class="pc-specs">
            ${p.beds !== '—' ? `<div class="spec"><i class="fas fa-bed"></i> ${p.beds}</div>` : ''}
            <div class="spec"><i class="fas fa-vector-square"></i> ${p.area}</div>
            ${p.baths ? `<div class="spec"><i class="fas fa-bath"></i> ${p.baths} Bath</div>` : ''}
            <div class="spec"><i class="fas fa-layer-group"></i> ${p.floor} Floor</div>
          </div>
          <div class="pc-tags">
            <span class="pt">${p.furnished}</span>
            <span class="pt">${p.available}</span>
            ${p.is_new ? '<span class="pt" style="background:#dbeafe;color:#1e40af;">Just Listed</span>' : ''}
          </div>
          <div class="pc-footer">
            <div class="pc-agent">
              <div class="pa-av" style="background:#f97316;">
                ${p.owner.slice(0, 2).toUpperCase()}
              </div>
              <div>
                <div class="pa-name">${p.owner}</div>
                <div class="pa-role">${p.owner_role}</div>
              </div>
            </div>
            <div class="pc-contact-btns">
              <button class="cb" onclick="event.preventDefault();event.stopPropagation();contactListing('${p.phone}')">
                <i class="fas fa-phone"></i> Call
              </button>
              <button class="cb wa" onclick="event.preventDefault();event.stopPropagation();waListing('${p.phone}')">
                <i class="fab fa-whatsapp"></i>
              </button>
            </div>
          </div>
        </div>
      </a>
    `;
  }).join('');
}

function renderAppliedFilters() {
  const container = document.getElementById('appliedFilters');
  const chips = [];
  
  // Listing type chip
  const typeText = currentFilters.listingType === 'sale' ? 'For Sale' :
                   currentFilters.listingType === 'commercial' ? 'Commercial' : 'For Rent';
  chips.push(`<div class="af-tag">${typeText}</div>`);
  
  // BHK chips
  currentFilters.bhk.forEach(bhk => {
    chips.push(`
      <div class="af-tag" onclick="removeFilter('bhk', '${bhk}')">
        ${bhk.toUpperCase()}
        <i class="fas fa-times" style="font-size:.6rem;"></i>
      </div>
    `);
  });
  
  // Area chips
  currentFilters.area.forEach(area => {
    chips.push(`
      <div class="af-tag" onclick="removeFilter('area', '${area}')">
        ${area}
        <i class="fas fa-times" style="font-size:.6rem;"></i>
      </div>
    `);
  });
  
  // Furnishing chips
  currentFilters.furnishing.forEach(furn => {
    chips.push(`
      <div class="af-tag" onclick="removeFilter('furnishing', '${furn}')">
        ${furn}
        <i class="fas fa-times" style="font-size:.6rem;"></i>
      </div>
    `);
  });
  
  // Budget chip
  if (currentFilters.maxBudget < 100000) {
    const budgetText = currentFilters.listingType === 'sale' 
      ? `Under ₹${(currentFilters.maxBudget / 100000).toFixed(0)}L`
      : `Under ₹${(currentFilters.maxBudget / 1000).toFixed(0)}K`;
    chips.push(`
      <div class="af-tag" onclick="currentFilters.maxBudget = 100000; document.getElementById('budgetRange').value = 100000; applyFilters()">
        ${budgetText}
        <i class="fas fa-times" style="font-size:.6rem;"></i>
      </div>
    `);
  }
  
  // Status chips
  if (currentFilters.verified) {
    chips.push(`
      <div class="af-tag" onclick="document.getElementById('f-verified').checked = false; currentFilters.verified = false; applyFilters()">
        ✅ Verified
        <i class="fas fa-times" style="font-size:.6rem;"></i>
      </div>
    `);
  }
  if (currentFilters.featured) {
    chips.push(`
      <div class="af-tag" onclick="document.getElementById('f-featured').checked = false; currentFilters.featured = false; applyFilters()">
        ⭐ Featured
        <i class="fas fa-times" style="font-size:.6rem;"></i>
      </div>
    `);
  }
  
  if (chips.length > 1) { // More than just listing type
    container.innerHTML = `<span class="af-label">Applied:</span>` + chips.join('');
  } else {
    container.innerHTML = '';
  }
}

function removeFilter(type, value) {
  currentFilters[type] = currentFilters[type].filter(v => v !== value);
  
  // Update UI
  document.querySelectorAll(`.filter-btn[data-filter="${type}"][data-value="${value}"]`).forEach(btn => {
    btn.classList.remove('active');
  });
  
  // Clear search bar if needed
  if (type === 'bhk') {
    document.getElementById('type-sel').value = '';
  }
  if (type === 'furnishing') {
    document.getElementById('furn-sel').value = '';
  }
  
  applyFilters();
}

function updateResultCount(count) {
  document.getElementById('resultCount').textContent = count;
}

// ══════════════════════════════════════════════════════════════════════════════
// LISTING TYPE SWITCHING
// ══════════════════════════════════════════════════════════════════════════════
function setListingType(type) {
  currentFilters.listingType = type;
  
  // Update nav tabs
  document.querySelectorAll('.nl').forEach(tab => tab.classList.remove('active'));
  document.getElementById(type + 'Tab').classList.add('active');
  
  // Update breadcrumb
  const breadcrumbText = type === 'sale' ? 'Sale' : type === 'commercial' ? 'Commercial' : 'Rent';
  document.getElementById('breadcrumbType').textContent = breadcrumbText;
  
  // Update listing type text
  const listingText = type === 'sale' ? 'for sale' : type === 'commercial' ? 'commercial' : 'for rent';
  document.getElementById('listingTypeText').textContent = listingText;
  
  // Update budget label and options
  const budgetLabel = document.getElementById('budgetLabel');
  const budgetSelect = document.getElementById('budget-sel');
  
  if (type === 'sale') {
    budgetLabel.textContent = 'Max Price';
    budgetSelect.innerHTML = `
      <option value="">Any Budget</option>
      <option value="3000000">Under ₹30L</option>
      <option value="6000000">₹30L–60L</option>
      <option value="10000000">₹60L–1Cr</option>
      <option value="100000000">₹1Cr+</option>
    `;
  } else {
    budgetLabel.textContent = 'Max Rent';
    budgetSelect.innerHTML = `
      <option value="">Any Budget</option>
      <option value="8000">Under ₹8K</option>
      <option value="15000">₹8K–15K</option>
      <option value="25000">₹15K–25K</option>
      <option value="40000">₹25K–40K</option>
      <option value="100000">₹40K+</option>
    `;
  }
  
  applyFilters();
}

// ══════════════════════════════════════════════════════════════════════════════
// RESET FUNCTIONS
// ══════════════════════════════════════════════════════════════════════════════
function resetFilters() {
  // Clear filter state
  currentFilters.bhk = [];
  currentFilters.area = [];
  currentFilters.furnishing = [];
  currentFilters.maxBudget = 100000;
  currentFilters.verified = false;
  currentFilters.featured = false;
  currentFilters.owner = false;
  currentFilters.pet = false;
  currentFilters.amenities = [];
  
  // Clear UI
  document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
  document.querySelectorAll('.checkbox-item input').forEach(cb => cb.checked = false);
  
  // Reset search bar
  document.getElementById('loc-inp').value = 'Nagpur';
  document.getElementById('type-sel').value = '';
  document.getElementById('budget-sel').value = '';
  document.getElementById('furn-sel').value = '';
  document.getElementById('budgetRange').value = 100000;
  document.getElementById('budgetVal').textContent = 'Up to ₹1,00,000';
  
  applyFilters();
}

function resetAll() {
  currentFilters.listingType = 'rent';
  document.querySelectorAll('.nl').forEach(tab => tab.classList.remove('active'));
  document.getElementById('rentTab').classList.add('active');
  resetFilters();
}

// ══════════════════════════════════════════════════════════════════════════════
// UI HELPERS
// ══════════════════════════════════════════════════════════════════════════════
function updateBudget(el) {
  currentFilters.maxBudget = parseInt(el.value);
  document.getElementById('budgetVal').textContent = 'Up to ₹' + parseInt(el.value).toLocaleString('en-IN');
}

function setView(v, btn) {
  document.querySelectorAll('.vt-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const grid = document.getElementById('listingsGrid');
  grid.classList.toggle('list-view', v === 'list');
}

function toggleSave(id, btn) {
  btn.classList.toggle('saved');
  const i = btn.querySelector('i');
  i.className = btn.classList.contains('saved') ? 'fas fa-heart' : 'far fa-heart';
  
  Swal.fire({
    toast: true,
    position: 'top-end',
    icon: btn.classList.contains('saved') ? 'success' : 'info',
    title: btn.classList.contains('saved') ? 'Added to favorites' : 'Removed from favorites',
    showConfirmButton: false,
    timer: 1500
  });
}

function viewProperty(id) {
  const prop = allProperties.find(p => p.id === id);
  if (!prop) return;
  
  // Store property data in localStorage
  localStorage.setItem('currentProperty', JSON.stringify(prop));
  
  // Navigate to detail page
  window.location.href = 'property-detail.html?id=' + id;
}

function contactListing(phone) {
  Swal.fire({
    title: 'Contact Owner',
    html: `<div style="text-align:center;padding:8px;">
      <div style="font-size:1.1rem;font-weight:900;color:#f97316;">📞 ${phone || 'N/A'}</div>
      <div style="font-size:.74rem;color:#64748b;margin-top:6px;">PropCRM Verified · Available 9AM–7PM</div>
    </div>`,
    background: '#fff', 
    color: '#1e293b',
    confirmButtonColor: '#f97316', 
    confirmButtonText: 'Call Now',
  });
}

function waListing(phone) {
  if (phone) {
    window.open(`https://wa.me/91${phone}`, '_blank');
  } else {
    Swal.fire({ 
      icon: 'info', 
      title: 'No WhatsApp number available',
      background: '#fff', 
      timer: 1400, 
      showConfirmButton: false 
    });
  }
}
